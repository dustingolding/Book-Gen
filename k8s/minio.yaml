apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: sideline-wire-dailycast
  labels:
    app: minio
    app.kubernetes.io/part-of: slw-dailycast
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: sideline-wire-dailycast
  labels:
    app: minio
    app.kubernetes.io/part-of: slw-dailycast
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        app.kubernetes.io/part-of: slw-dailycast
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
        slw/workload: ops
      terminationGracePeriodSeconds: 30
      containers:
        - name: minio
          image: minio/minio:RELEASE.2021-06-17T00-10-46Z
          imagePullPolicy: IfNotPresent
          args: ["server", "/data"]
          ports:
            - containerPort: 9000
              name: api
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: slw-dailycast-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: slw-dailycast-secrets
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 50Gi
