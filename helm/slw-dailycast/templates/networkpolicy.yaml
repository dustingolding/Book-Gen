{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "slw-dailycast.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "slw-dailycast.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "slw-dailycast.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/part-of: slw-dailycast
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.allowMinioNamespace }}
      ports:
{{- range .Values.networkPolicy.minioPorts }}
        - protocol: TCP
          port: {{ . }}
{{- end }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.postgres.namespace }}
          podSelector:
            matchLabels:
{{ toYaml .Values.networkPolicy.postgres.podSelector | indent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.mlflow.namespace }}
          podSelector:
            matchLabels:
{{ toYaml .Values.networkPolicy.mlflow.podSelector | indent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.mlflow.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.allowPrefectNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.prefectPort }}
{{- if .Values.networkPolicy.allowLlmHttps }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- end }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.allowDnsNamespace }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
