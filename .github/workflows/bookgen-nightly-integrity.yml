name: bookgen-nightly-integrity

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      project_id:
        description: "Project ID to validate (default: closed-session-llm-pilot-003)"
        required: false
        default: "closed-session-llm-pilot-003"
        type: string

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ inputs.project_id != '' && inputs.project_id || 'closed-session-llm-pilot-003' }}
      REPO_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest publish-gate run for project artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_name="publish-package-${PROJECT_ID}"
          run_id="$(gh api "repos/${REPO_NAME}/actions/artifacts?per_page=100" --jq "[.artifacts[] | select(.name==\"${artifact_name}\" and .expired==false) | .workflow_run.id][0] // \"\"")"
          if [[ -z "${run_id}" ]]; then
            echo "No non-expired artifact found for ${artifact_name}" >&2
            exit 1
          fi
          echo "RUN_ID=${run_id}" >> "${GITHUB_ENV}"

      - name: Run collect-only handoff integrity check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/bookgen_release_handoff.sh \
            --repo "${REPO_NAME}" \
            --project-id "${PROJECT_ID}" \
            --collect-only \
            --run-id "${RUN_ID}"

      - name: Upload nightly integrity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-integrity-${{ env.PROJECT_ID }}-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            exports/publish-handoffs/${{ env.PROJECT_ID }}.json
            exports/publish-artifacts/

      - name: Open/update integrity failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `BookGen nightly integrity failed: ${process.env.PROJECT_ID}`;
            const body = [
              `Nightly BookGen integrity check failed for project \`${process.env.PROJECT_ID}\`.`,
              ``,
              `Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              `Workflow: ${context.workflow}`,
              `Branch: ${context.ref}`,
              ``,
              `Action needed: investigate publish artifact checksum verification and release handoff output.`
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["bookgen", "integrity", "ops"]
              });
            }

      - name: Auto-close integrity failure issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `BookGen nightly integrity failed: ${process.env.PROJECT_ID}`;
            const recoveryBody = [
              `Nightly BookGen integrity check recovered for project \`${process.env.PROJECT_ID}\`.`,
              ``,
              `Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              `Result: success`,
              ``,
              `Closing this issue automatically.`
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: recoveryBody
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed"
              });
            }
