name: bookgen-strict-handoff-on-regression

on:
  workflow_run:
    workflows:
      - "bookgen-regression-gate-selfhosted"
      - "bookgen-weekly-6chapter-gate-selfhosted"
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Series target (all|closed-session|time-tinkers)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - closed-session
          - time-tinkers

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: bookgen-strict-handoff-on-regression
  cancel-in-progress: false

jobs:
  strict-handoff:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: closed-session
            project_id: closed-session-llm-pilot-003
          - id: time-tinkers
            project_id: time-tinkers-lab
    steps:
      - uses: actions/checkout@v4

      - name: Verify gh availability
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.id }}
        run: gh --version

      - name: Run strict handoff
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.id }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/bookgen_release_handoff.sh \
            --repo "${{ github.repository }}" \
            --project-id "${{ matrix.project_id }}" \
            --skip-runner-check

      - name: Upload handoff summary
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.id) }}
        uses: actions/upload-artifact@v4
        with:
          name: bookgen-handoff-${{ matrix.project_id }}-${{ github.run_id }}
          path: |
            exports/publish-handoffs/${{ matrix.project_id }}.json
            exports/publish-artifacts/

  handoff-alerts:
    if: always()
    needs: strict-handoff
    runs-on: ubuntu-latest
    steps:
      - name: Open/update strict handoff failure issue
        if: ${{ needs.strict-handoff.result == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "BookGen strict handoff failed";
            const body = [
              "Downstream strict handoff workflow failed.",
              "",
              `Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              `Workflow: ${context.workflow}`,
              "",
              "Action needed: inspect publish-gate workflow dispatch + artifact checksum/handoff collection."
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["bookgen", "handoff", "ops"]
              });
            }

      - name: Auto-close strict handoff failure issue on recovery
        if: ${{ needs.strict-handoff.result == 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "BookGen strict handoff failed";
            const body = [
              "Strict handoff workflow recovered.",
              "",
              `Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              "Result: success",
              "",
              "Closing this issue automatically."
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed"
              });
            }
