apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookgen-job-cleanup
  namespace: sideline-wire-dailycast
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bookgen-job-cleanup
  namespace: sideline-wire-dailycast
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bookgen-job-cleanup
  namespace: sideline-wire-dailycast
subjects:
  - kind: ServiceAccount
    name: bookgen-job-cleanup
    namespace: sideline-wire-dailycast
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bookgen-job-cleanup
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bookgen-job-cleanup
  namespace: sideline-wire-dailycast
spec:
  # Daily at 03:17 UTC.
  schedule: "17 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: bookgen-job-cleanup
          restartPolicy: Never
          containers:
            - name: cleanup
              image: bitnami/kubectl:1.34
              imagePullPolicy: IfNotPresent
              env:
                - name: NAMESPACE
                  value: sideline-wire-dailycast
                - name: RETENTION_HOURS
                  value: "72"
              command:
                - /bin/sh
                - -lc
                - |
                  set -eu
                  cutoff_epoch="$(date -u -d "-${RETENTION_HOURS} hours" +%s)"
                  kubectl -n "${NAMESPACE}" get jobs -o jsonpath='{range .items[*]}{.metadata.name}{"|"}{.status.active}{"|"}{.status.completionTime}{"|"}{.status.conditions[?(@.type=="Failed")].lastTransitionTime}{"\n"}{end}' \
                    | while IFS='|' read -r name active completion_time failed_time; do
                        case "${name}" in
                          bookgen-*) ;;
                          *) continue ;;
                        esac
                        active="${active:-0}"
                        if [ "${active}" != "0" ]; then
                          continue
                        fi
                        timestamp="${completion_time:-}"
                        if [ -z "${timestamp}" ]; then
                          timestamp="${failed_time:-}"
                        fi
                        if [ -z "${timestamp}" ]; then
                          continue
                        fi
                        ts_epoch="$(date -u -d "${timestamp}" +%s 2>/dev/null || echo 0)"
                        if [ "${ts_epoch}" -le 0 ]; then
                          continue
                        fi
                        if [ "${ts_epoch}" -le "${cutoff_epoch}" ]; then
                          kubectl -n "${NAMESPACE}" delete job "${name}" --ignore-not-found=true >/dev/null
                          echo "deleted ${name}"
                        fi
                      done
