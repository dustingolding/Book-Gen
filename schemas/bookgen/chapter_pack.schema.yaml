$schema: "https://json-schema.org/draft/2020-12/schema"
title: ChapterPack
type: object
required:
  - schema_version
  - series_id
  - installment_id
  - chapter_index
  - chapter_id
  - created_utc
  - chapter_card
  - character_state_slice
  - world_slice
  - tone_style_snapshot
  - continuity_slice
  - research_slice
  - scene_constraints
properties:
  schema_version:
    type: string
  chapter_index:
    type: integer
    minimum: 1
  chapter_id:
    type: string
  chapter_card:
    type: object
  character_state_slice:
    type: array
    minItems: 1
  world_slice:
    type: object
  tone_style_snapshot:
    type: object
  continuity_slice:
    type: object
  research_slice:
    type: object
  scene_constraints:
    type: object
additionalProperties: true
