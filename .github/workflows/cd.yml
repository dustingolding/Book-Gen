name: cd

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/slw-dailycast-base
  RELEASE_NAME: slw-dailycast
  NAMESPACE: sideline-wire-dailycast

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push ingest image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ingest
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/slw-dailycast-ingest:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/slw-dailycast-ingest:latest

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.agent
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/slw-dailycast-agent:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/slw-dailycast-agent:latest

      - name: Build and push renderer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.renderer
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/slw-dailycast-renderer:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/slw-dailycast-renderer:latest

  deploy-helm:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.KUBE_CONFIG_B64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG_B64}" | base64 -d > ~/.kube/config
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}

      - name: Helm upgrade/install
        run: |
          ./scripts/helm_deploy.sh \
            "${RELEASE_NAME}" \
            "${NAMESPACE}" \
            "${REGISTRY}/${IMAGE_NAME}" \
            "${IMAGE_TAG}"
        env:
          RELEASE_NAME: ${{ env.RELEASE_NAME }}
          NAMESPACE: ${{ env.NAMESPACE }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

  register-prefect:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.PREFECT_API_URL != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Register Prefect deployment
        run: ./scripts/register_prefect_deployment.sh dailycast-prod
        env:
          PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
