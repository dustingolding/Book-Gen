apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prefect-server-ingress
  namespace: sideline-wire-dailycast
spec:
  podSelector:
    matchLabels:
      app: prefect-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: slw-dailycast
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 4200
