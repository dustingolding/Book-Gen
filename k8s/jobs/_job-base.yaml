apiVersion: batch/v1
kind: Job
metadata:
  name: slw-stage-template
  namespace: sideline-wire-dailycast
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: slw-dailycast
        app.kubernetes.io/part-of: slw-dailycast
    spec:
      serviceAccountName: slw-dailycast
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/arch: amd64
        slw/workload: ops
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: stage
          image: ghcr.io/dustingolding/slw-dailycast-base:latest
          imagePullPolicy: IfNotPresent
          args: ["run-flow"]
          envFrom:
            - secretRef:
                name: slw-dailycast-secrets
            - configMapRef:
                name: slw-dailycast-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: cache
              mountPath: /var/lib/slw
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: slw-dailycast-pvc
