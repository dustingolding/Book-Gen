$schema: "https://json-schema.org/draft/2020-12/schema"
title: BenchmarkDrift
type: object
required:
  - schema_version
  - project_id
  - installment_id
  - created_utc
  - baseline_available
  - pass_status
  - summary
  - deltas
  - alerts
properties:
  schema_version:
    type: string
  project_id:
    type: string
  installment_id:
    type: string
  created_utc:
    type: string
  baseline_available:
    type: boolean
  baseline_installment_id:
    type: string
  pass_status:
    enum: [PASS, PASS_WITH_NOTES, FAIL]
  summary:
    type: string
  deltas:
    type: object
  alerts:
    type: array
    items:
      type: object
additionalProperties: true
