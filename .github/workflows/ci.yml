name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: |
          ruff check app tests
          helm lint helm/slw-dailycast

      - name: Unit tests
        run: pytest -q -m "not integration"

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: slw
          POSTGRES_PASSWORD: slwpass
          POSTGRES_DB: slw_dailycast
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U slw -d slw_dailycast"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: bitnami/minio:2025
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: slw-dailycast
        ports:
          - 9000:9000
    env:
      MINIO_ENDPOINT: http://127.0.0.1:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      PG_HOST: 127.0.0.1
      PG_PORT: "5432"
      PG_USER: slw
      PG_PASSWORD: slwpass
      PG_DB: slw_dailycast
      MLFLOW_TRACKING_URI: file:///tmp/mlruns
      PREFECT_API_URL: http://127.0.0.1:4200/api
      S3_BUCKET: slw-dailycast
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Wait for MinIO
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:9000/minio/health/live && exit 0
            sleep 2
          done
          exit 1

      - name: Integration tests
        run: pytest -q -m integration tests/integration
