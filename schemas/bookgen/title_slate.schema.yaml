$schema: "https://json-schema.org/draft/2020-12/schema"
title: TitleSlate
type: object
required:
  - schema_version
  - series_id
  - engine_version
  - generated_utc
  - series_title
  - installments
properties:
  schema_version:
    type: string
  series_id:
    type: string
  engine_version:
    type: string
  generated_utc:
    type: string
    format: date-time
  series_title:
    type: string
    minLength: 1
  installments:
    type: array
    minItems: 1
    items:
      type: object
      required: [installment_id, installment_index, selected_title, title_lock_status, alternates]
additionalProperties: true
