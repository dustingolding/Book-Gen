$schema: "https://json-schema.org/draft/2020-12/schema"
title: NarrativeConstitution
type: object
required:
  - schema_version
  - constitution_id
  - title
  - created_utc
  - updated_utc
  - narrative_identity
  - theme_engine
  - world_model
  - character_registry
  - escalation_framework
  - rubric_defaults
properties:
  schema_version:
    type: string
  constitution_id:
    type: string
    minLength: 3
  title:
    type: string
    minLength: 1
  created_utc:
    type: string
    format: date-time
  updated_utc:
    type: string
    format: date-time
  narrative_identity:
    type: object
    required:
      - form
      - genre
      - audience
      - pov
      - tone_lock
      - style_constitution
    properties:
      form:
        enum: [series, standalone, anthology]
      genre:
        type: string
      subgenre:
        type: string
      audience:
        type: object
      pov:
        type: object
      tone_lock:
        type: object
        required: [description]
        properties:
          description:
            type: string
            minLength: 10
      style_constitution:
        type: object
    additionalProperties: true
  theme_engine:
    type: object
    required: [primary]
    properties:
      primary:
        type: object
        required: [statement, manifestation_mode]
      secondary:
        type: array
      evolution_policy:
        type: object
    additionalProperties: true
  world_model:
    type: object
    required: [setting, governing_rules, realism_constraints]
    properties:
      setting:
        type: object
      governing_rules:
        type: array
        minItems: 1
      realism_constraints:
        type: object
    additionalProperties: true
  character_registry:
    type: object
    required: [characters]
    properties:
      characters:
        type: array
        minItems: 1
    additionalProperties: true
  escalation_framework:
    type: object
    required: [enabled, model, ceilings, rules, matrix]
    properties:
      enabled:
        type: boolean
      matrix:
        type: array
        minItems: 1
    additionalProperties: true
  rubric_defaults:
    type: object
    required: [weights, thresholds]
    properties:
      weights:
        type: object
      thresholds:
        type: object
    additionalProperties: true
additionalProperties: true
