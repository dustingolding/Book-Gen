name: bookgen-publish-gate

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "BookGen project ID to validate for publish readiness"
        required: true
        type: string
      require_promotion:
        description: "Fail readiness if no promotion reference exists"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish-gate:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ inputs.project_id }}
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_SECURE: "false"
      S3_BUCKET: "slw-dailycast"
      LAKEFS_ENDPOINT: ${{ secrets.LAKEFS_ENDPOINT }}
      LAKEFS_ACCESS_KEY: ${{ secrets.LAKEFS_ACCESS_KEY }}
      LAKEFS_SECRET_KEY: ${{ secrets.LAKEFS_SECRET_KEY }}
      LAKEFS_REPOSITORY: ${{ secrets.LAKEFS_REPOSITORY }}
      LAKEFS_REPO: ${{ secrets.LAKEFS_REPOSITORY }}
      LAKEFS_BRANCH: ${{ secrets.LAKEFS_BRANCH }}
      KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
      PG_HOST: "127.0.0.1"
      PG_PORT: "5432"
      PG_USER: "placeholder"
      PG_PASSWORD: "placeholder"
      PG_DB: "placeholder"
      MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
      PREFECT_API_URL: "http://127.0.0.1:4200/api"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up kubectl (optional)
        if: ${{ env.KUBE_CONFIG_B64 != '' }}
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig (optional)
        if: ${{ env.KUBE_CONFIG_B64 != '' }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG_B64}" | base64 -d > ~/.kube/config

      - name: Validate required storage/release environment
        run: |
          required=(
            MINIO_ENDPOINT
            MINIO_ACCESS_KEY
            MINIO_SECRET_KEY
            S3_BUCKET
            LAKEFS_ENDPOINT
            LAKEFS_ACCESS_KEY
            LAKEFS_SECRET_KEY
            LAKEFS_REPOSITORY
            LAKEFS_BRANCH
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required secret/env: ${key}" >&2
              exit 1
            fi
          done

          is_local_or_cluster_endpoint() {
            local endpoint="$1"
            [[ "${endpoint}" == *".svc.cluster.local"* ]] || [[ "${endpoint}" == *"127.0.0.1"* ]] || [[ "${endpoint}" == *"localhost"* ]]
          }

          if [[ -z "${KUBE_CONFIG_B64:-}" ]] && (is_local_or_cluster_endpoint "${MINIO_ENDPOINT}" || is_local_or_cluster_endpoint "${LAKEFS_ENDPOINT}"); then
            echo "Storage endpoints are local/cluster-internal but KUBE_CONFIG_B64 is not set." >&2
            echo "Set KUBE_CONFIG_B64 secret, or use externally reachable MINIO_ENDPOINT/LAKEFS_ENDPOINT." >&2
            exit 1
          fi

      - name: Run publish preparation pipeline
        run: |
          args=(--project-id "${PROJECT_ID}")
          if [[ "${{ inputs.require_promotion }}" == "true" ]]; then
            args+=(--require-promotion)
          fi
          ./scripts/bookgen_prepare_publish.sh "${args[@]}"

      - name: Verify package checksum
        run: |
          cd "exports/publish-packages/${PROJECT_ID}"
          sha256sum -c SHA256SUMS.txt

      - name: Upload publish package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: publish-package-${{ inputs.project_id }}
          path: |
            exports/publish-packages/${{ inputs.project_id }}/*
            docs/bookgen/checklists/${{ inputs.project_id }}.md
