$schema: "https://json-schema.org/draft/2020-12/schema"
title: SceneCards
type: object
required:
  - schema_version
  - installment_id
  - chapter_id
  - chapter_index
  - scenes
properties:
  schema_version:
    type: string
  installment_id:
    type: string
  chapter_id:
    type: string
  chapter_index:
    type: integer
    minimum: 1
  scenes:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - scene_index
        - scene_id
        - scene_label
        - objective
        - conflict_type
        - location
        - required_outcome
        - tension_level
additionalProperties: true
