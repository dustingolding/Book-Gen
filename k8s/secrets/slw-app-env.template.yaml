apiVersion: v1
kind: Secret
metadata:
  name: slw-dailycast-secrets
  namespace: sideline-wire-dailycast
type: Opaque
stringData:
  MINIO_ENDPOINT: "http://minio.sideline-wire-dailycast.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: ""
  MINIO_SECRET_KEY: ""
  MINIO_SECURE: "false"
  PG_HOST: "postgres.sideline-wire-dailycast.svc.cluster.local"
  PG_PORT: "5432"
  PG_USER: ""
  PG_PASSWORD: ""
  PG_DB: "slw_dailycast"
  PREFECT_API_URL: "http://prefect-server.sideline-wire-dailycast.svc.cluster.local:4200/api"
  MLFLOW_TRACKING_URI: "http://mlflow.log-anomaly.svc.cluster.local:5000"

  # lakeFS
  LAKEFS_ENABLED: "true"
  LAKEFS_ENDPOINT: "http://lakefs.sideline-wire-dailycast.svc.cluster.local"
  LAKEFS_LOCAL_ENDPOINT: "http://127.0.0.1:18000"
  LAKEFS_REPO: "slw-dailycast"
  LAKEFS_ACCESS_KEY: ""
  LAKEFS_SECRET_KEY: ""
  LAKEFS_SOURCE_BRANCH: "main"
  LAKEFS_BOOKGEN_BRANCH_PREFIX: "bookgen"
  LAKEFS_DAILYCAST_BRANCH_PREFIX: "run"

  # RAG/Embeddings
  PGVECTOR_CONNINFO: ""
  EMBEDDING_MODEL: ""
  RAG_TOP_K: "10"
  RAG_MIN_SCORE: "0.15"

  # LLM
  LLM_ENDPOINT: ""
  LLM_API_KEY: ""
  LLM_MODEL: ""

  # Optional TTS gate
  ELEVENLABS_ENABLED: "false"
  ELEVENLABS_API_KEY: ""
  ELEVEN_VOICE_EVAN: ""
  ELEVEN_VOICE_MARCUS: ""
