$schema: "https://json-schema.org/draft/2020-12/schema"
title: RewriteContract
type: object
required:
  - schema_version
  - series_id
  - installment_id
  - chapter_id
  - attempt
  - preserve
  - improve
  - do_not_change
  - constraints
properties:
  schema_version:
    type: string
  attempt:
    type: integer
    minimum: 1
  preserve:
    type: array
    minItems: 1
  improve:
    type: array
  do_not_change:
    type: array
    minItems: 1
  constraints:
    type: object
additionalProperties: true
